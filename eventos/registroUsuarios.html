<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - SRAE</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="css/style.css">



    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>
<body class="bg-light">
<div class="container d-flex justify-content-center align-items-center min-vh-100">

    <div class="card p-4 shadow-sm tarjeta-personalizada">

        <div class="card-body text-center">

            <div class="card-body text-center">

                <img src="img/logo.png" alt="Logo SRAE" class="mb-4" style="max-height: 100px;">

                <form>

                    <div class="mb-3 text-start">
                        <label for="nombre" class="form-label fw-bold label-formulario">Nombre Completo:</label>
                        <input type="text" class="form-control input-formulario" id="nombre" placeholder="Tu nombre:">
                    </div>

                    <div class="mb-3 text-start">
                        <label for="email" class="form-label fw-bold label-formulario">Correo Electrónico:</label>
                        <input type="email" class="form-control input-formulario" id="email" placeholder="Tu correo electrónico:">
                    </div>

                    <div class="mb-4 text-start">
                        <label for="password" class="form-label fw-bold label-formulario">Contraseña:</label>
                        <input type="password" class="form-control input-formulario" id="password" placeholder="Tu contraseña:">
                    </div>

                    <div class="text-center mt-2">
                        <button type="submit" class="btn text-white fw-bold py-2 px-5 d-inline-flex align-items-center justify-content-center btn-srae">
                            <i class="bi bi-cursor me-2" style="font-size: 1.2rem;"></i> Registrarse
                        </button>
                    </div>

                </form>

            </div>

        </div>

    </div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
